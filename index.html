<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🚀 Pharos Price Tracker</title>

<style>
body{
background:#0d1117;
color:white;
font-family:Arial,sans-serif;
padding:20px;
margin:0;
}

h1{
text-align:center;
margin-bottom:20px;
}

.banner{
background:linear-gradient(135deg,#238636,#1f6feb);
padding:15px;
border-radius:15px;
margin-bottom:15px;
line-height:1.8;
}

.summary{
background:#161b22;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.updated{
text-align:center;
color:#aaa;
margin-bottom:15px;
}

.card{
background:#161b22;
padding:15px;
margin-bottom:10px;
border-radius:12px;
}

a{
color:#58a6ff;
text-decoration:none;
font-weight:bold;
}

.green{
color:#00ff88;
font-weight:bold;
}

.red{
color:#ff5555;
font-weight:bold;
}
</style>
</head>

<body>

<h1>🚀 Pharos Price Tracker</h1>

<div id="prices">Loading prices...</div>

<script>

async function loadPrices(){

try{

const res = await fetch(
"https://api.coingecko.com/api/v3/coins/pharos-network/tickers"
);

const data = await res.json();

/* USDT pairs only */
const tickers = data.tickers
.filter(t => t.target === "USDT")
.sort((a,b) => Number(a.last) - Number(b.last))
.slice(0,15);

const prices = tickers.map(t => Number(t.last));

const lowestPrice = Math.min(...prices);
const highestPrice = Math.max(...prices);

const lowestExchange =
tickers.find(t => Number(t.last) === lowestPrice)?.market.name || "N/A";

const highestExchange =
tickers.find(t => Number(t.last) === highestPrice)?.market.name || "N/A";

const differencePercent =
(((highestPrice - lowestPrice) / lowestPrice) * 100)
.toFixed(2);

const now = new Date().toLocaleTimeString();

const links = {
"Bitget":"https://www.bitget.com",
"MEXC":"https://www.mexc.com",
"Gate.io":"https://www.gate.io",
"KuCoin":"https://www.kucoin.com",
"Bybit":"https://www.bybit.com",
"OKX":"https://www.okx.com",
"Upbit":"https://www.upbit.com"
};

let html = `

<div class="banner">
🚀 <b>Best Buy:</b> ${lowestExchange} ($${lowestPrice})<br>
🔥 <b>Best Sell:</b> ${highestExchange} ($${highestPrice})<br>
💰 <b>Arbitrage Opportunity:</b> ${differencePercent}%
</div>

<div class="summary">
📊 <b>Market Summary</b><br><br>

🟢 Lowest Price: $${lowestPrice}<br>
🔴 Highest Price: $${highestPrice}<br>
📈 Difference: ${differencePercent}%
</div>

<div class="updated">
Last Updated: ${now}
</div>

`;

tickers.forEach(t => {

let badge = "";

if(Number(t.last) === lowestPrice){
badge = ' <span class="green">🟢 Lowest</span>';
}
else if(Number(t.last) === highestPrice){
badge = ' <span class="red">🔴 Highest</span>';
}

const exchangeLink = links[t.market.name] || "#";

html += `
<div class="card">
<a href="${exchangeLink}" target="_blank">
${t.market.name}
</a>
<br><br>
Price: $${Number(t.last).toFixed(6)}${badge}
</div>
`;

});

document.getElementById("prices").innerHTML = html;

}catch(error){

document.getElementById("prices").innerHTML =
"Failed to load prices";

console.error(error);

}

}

loadPrices();
setInterval(loadPrices,30000);

</script>

</body>
</html>
