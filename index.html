<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pharos Price Tracker</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}
.card{
background:#222;
padding:12px;
margin:10px 0;
border-radius:10px;
}
a{
color:#00ff99;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<h1>🚀 Pharos Price Tracker</h1>

<div id="prices">Loading prices...</div>

<script>

async function loadPrices(){

const res = await fetch(
"https://api.coingecko.com/api/v3/coins/pharos-network/tickers"
);

const data = await res.json();
const prices = data.tickers.slice(0,15).map(t => Number(t.last));

const lowestPrice = Math.min(...prices);
const highestPrice = Math.max(...prices);
let html = "";

data.tickers.slice(0,15).forEach(t => {

let badge = "";

if (Number(t.last) === lowestPrice) {
  badge = " 🟢 Lowest";
} else if (Number(t.last) === highestPrice) {
  badge = " 🔴 Highest";
}

const links = {
 "Bitget":"https://www.bitget.com",
 "MEXC":"https://www.mexc.com",
 "Gate.io":"https://www.gate.io",
 "KuCoin":"https://www.kucoin.com",
 "Bybit":"https://www.bybit.com",
 "OKX":"https://www.okx.com"
};

const exchangeLink = links[t.market.name] || "#";

html += `
<div class="card">
<a href="${exchangeLink}" target="_blank">
${t.market.name}
</a>
<br>
Price: $${t.last}${badge}
</div>
`;

});

document.getElementById("prices").innerHTML = html;

loadPrices();

</script>

</body>

</html>
