<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharos Price Tracker Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
margin:0;color:#fff;font-family:Arial,sans-serif;
background:linear-gradient(rgba(5,10,20,.85),rgba(5,10,20,.95));
min-height:100vh;
}
body:before{
content:"";position:fixed;inset:0;pointer-events:none;
background:
radial-gradient(circle at 20% 20%,rgba(0,140,255,.25),transparent 30%),
radial-gradient(circle at 80% 30%,rgba(0,255,255,.15),transparent 30%);
}
.container{max-width:1200px;margin:auto;padding:20px}
h1{text-align:center;text-shadow:0 0 20px #39f}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
.card{
background:rgba(255,255,255,.06);
backdrop-filter:blur(12px);
border-radius:16px;padding:16px;
border:1px solid rgba(255,255,255,.08);
}
.exchange{display:flex;align-items:center;gap:10px}
.exchange img{width:40px;height:40px;border-radius:50%;background:#fff}
canvas{background:rgba(255,255,255,.04);border-radius:16px;padding:10px}
</style>
</head>
<body>
<div class="container">
<h1>🚀 Pharos Price Tracker Pro</h1>
<div id="stats" class="grid"></div>
<br>
<div class="card"><canvas id="chart"></canvas></div>
<br>
<div id="prices"></div>
</div>

<script>
const logos={
"KuCoin":"https://cryptologos.cc/logos/kucoin-token-kcs-logo.png",
"BitMart":"https://cryptologos.cc/logos/bitmart-bmx-logo.png",
"MEXC":"https://cryptologos.cc/logos/mexc-token-mx-logo.png"
};

let chart;
let history=[];

async function loadPrices(){
try{
const r=await fetch("https://api.coingecko.com/api/v3/coins/pharos-network/tickers");
const d=await r.json();

const tickers=d.tickers.filter(t=>t.target==="USDT").sort((a,b)=>a.last-b.last);
const low=tickers[0];
const high=tickers[tickers.length-1];
const diff=(((high.last-low.last)/low.last)*100).toFixed(2);

document.getElementById("stats").innerHTML=`
<div class="card">🟢 Best Buy<br><b>${low.market.name}</b><br>$${low.last}</div>
<div class="card">🔴 Best Sell<br><b>${high.market.name}</b><br>$${high.last}</div>
<div class="card">💰 Arbitrage<br><b>${diff}%</b></div>
<div class="card">🕒 Updated<br><b>${new Date().toLocaleTimeString()}</b></div>`;

const avg=tickers.reduce((s,t)=>s+Number(t.last),0)/tickers.length;
history.push(avg);
if(history.length>20) history.shift();

const ctx=document.getElementById("chart");
if(chart) chart.destroy();
chart=new Chart(ctx,{
type:"line",
data:{labels:history.map((_,i)=>i+1),
datasets:[{label:"Average Price",data:history}]}
});

document.getElementById("prices").innerHTML=tickers.map(t=>`
<div class="card">
<div class="exchange">
<img src="${logos[t.market.name]||'https://cdn-icons-png.flaticon.com/512/6001/6001527.png'}">
<div><b>${t.market.name}</b><br>$${Number(t.last).toFixed(6)}</div>
</div>
</div><br>`).join("");
}catch(e){
document.getElementById("prices").innerHTML="Failed to load data";
}
}
loadPrices();
setInterval(loadPrices,30000);
</script>
</body>
</html>
