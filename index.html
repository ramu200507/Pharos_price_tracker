<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pharos Price Tracker</title>

<style>
body{
  background:#0d1117;
  color:white;
  font-family:Arial,sans-serif;
  padding:20px;
}

h1{
  text-align:center;
}

.summary{
  background:#161b22;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.card{
  background:#161b22;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.02);
}

a{
  color:#58a6ff;
  text-decoration:none;
  font-weight:bold;
}

.updated{
  text-align:center;
  color:#aaa;
  margin-bottom:15px;
}
</style>
</head>

<body>

<h1>🚀 Pharos Price Tracker</h1>

<div id="prices">Loading prices...</div>

<script>

async function loadPrices(){

try{

const res = await fetch(
"https://api.coingecko.com/api/v3/coins/pharos-network/tickers"
);

const data = await res.json();

const tickers = data.tickers
.slice(0,15)
.sort((a,b)=>a.last-b.last);

const prices = tickers.map(t=>Number(t.last));

const lowestPrice = Math.min(...prices);
const highestPrice = Math.max(...prices);

const differencePercent =
(((highestPrice-lowestPrice)/lowestPrice)*100)
.toFixed(2);

const now = new Date().toLocaleTimeString();

let html = `
<div class="summary">
<b>📊 Arbitrage Summary</b><br><br>

🟢 Lowest Price: $${lowestPrice}<br>
🔴 Highest Price: $${highestPrice}<br>
📈 Difference: ${differencePercent}%<br>
</div>

<div class="updated">
Last Updated: ${now}
</div>
`;

const links = {
"Bitget":"https://www.bitget.com",
"MEXC":"https://www.mexc.com",
"Gate.io":"https://www.gate.io",
"KuCoin":"https://www.kucoin.com",
"Bybit":"https://www.bybit.com",
"OKX":"https://www.okx.com"
};

tickers.forEach(t=>{

let badge="";

if(Number(t.last)===lowestPrice){
badge=" 🟢 Lowest";
}
else if(Number(t.last)===highestPrice){
badge=" 🔴 Highest";
}

const exchangeLink =
links[t.market.name] || "#";

html += `
<div class="card">
<a href="${exchangeLink}" target="_blank">
${t.market.name}
</a>
<br><br>

Price: $${t.last}${badge}
</div>
`;

});

document.getElementById("prices").innerHTML = html;

}catch(error){

document.getElementById("prices").innerHTML =
"Failed to load prices";

console.log(error);

}

}

loadPrices();

setInterval(loadPrices,30000);

</script>

</body>
</html>
